<svg width="1024" height="1024" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2b46"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="folder-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3db89a" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="arrow-up" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#a0ffe8"/>
    </linearGradient>
    <linearGradient id="arrow-down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ea8de"/>
      <stop offset="100%" stop-color="#2d6fa3"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="none" stroke="#64ffda" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Folder outline -->
  <path d="M 120 175 L 120 380 Q 120 395 135 395 L 377 395 Q 392 395 392 380 L 392 195 Q 392 180 377 180 L 270 180 L 245 155 Q 238 148 228 148 L 135 148 Q 120 148 120 163 Z"
        fill="none" stroke="url(#folder-grad)" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 120 175 L 392 175" stroke="url(#folder-grad)" stroke-width="4" stroke-opacity="0.3"/>

  <!-- Arrow UP -->
  <g transform="translate(206, 210)">
    <path d="M 25 80 L 25 30 M 25 30 L 5 50 M 25 30 L 45 50"
          fill="none" stroke="url(#arrow-up)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Arrow DOWN -->
  <g transform="translate(276, 235)">
    <path d="M 25 0 L 25 50 M 25 50 L 5 30 M 25 50 L 45 30"
          fill="none" stroke="url(#arrow-down)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
